version: "3.8"

services:

  # ==========================================================
  # PostgreSQL
  # ==========================================================

  postgres:
    image: postgres:16
    container_name: ai_gateway_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: ai_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Jiya@3030

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_gateway"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ai_gateway_network

  # ==========================================================
  # Redis
  # ==========================================================

  redis:
    image: redis:7-alpine
    container_name: ai_gateway_redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - ai_gateway_network

  # ==========================================================
  # Qdrant
  # ==========================================================

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_gateway_qdrant

    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - ai_gateway_network

  # ==========================================================
  # Kafka
  # ==========================================================

  kafka:
    image: apache/kafka:latest
    container_name: ai_gateway_kafka

    restart: unless-stopped

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    networks:
      - ai_gateway_network

  # ==========================================================
  # Ollama
  # ==========================================================

  ollama:
    image: ollama/ollama:latest
    container_name: ai_gateway_ollama

    restart: unless-stopped

    ports:
      - "11434:11434"

    volumes:
      - ollama_data:/root/.ollama

    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 30s
      timeout: 10s
      retries: 5

    networks:
      - ai_gateway_network

  # ==========================================================
  # Gateway
  # ==========================================================

  gateway:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai_gateway

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - ai_gateway_network

  # ==========================================================
  # Analytics Worker
  # ==========================================================

  analytics-worker:
    build:
        context: .
        dockerfile: Dockerfile.worker

    container_name: ai_gateway_analytics_worker

    restart: unless-stopped

    env_file:
      - .env.docker

    command:
      - python
      - services/analytics_worker/worker.py

    depends_on:
      kafka:
        condition: service_started

    networks:
      - ai_gateway_network

  # ==========================================================
  # Audit Worker
  # ==========================================================

  audit-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker

    container_name: ai_gateway_audit_worker

    restart: unless-stopped

    env_file:
      - .env.docker

    command:
      - python
      - services/audit_worker/worker.py

    depends_on:
      kafka:
        condition: service_started

    networks:
      - ai_gateway_network

  # ==========================================================
  # Billing Worker
  # ==========================================================

  billing-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker

    container_name: ai_gateway_billing_worker

    restart: unless-stopped

    env_file:
      - .env.docker

    command:
      - python
      - services/billing_worker/worker.py

    depends_on:
      kafka:
        condition: service_started

    networks:
      - ai_gateway_network

# ==========================================================
# Volumes
# ==========================================================

volumes:

  postgres_data:

  redis_data:

  qdrant_data:

  ollama_data:

# ==========================================================
# Network
# ==========================================================

networks:

  ai_gateway_network:
    driver: bridge

